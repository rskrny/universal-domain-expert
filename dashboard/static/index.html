<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#141420">
<title>Neural Net</title>
<script src="/static/js/d3.v7.min.js"></script>
<script src="/static/js/marked.min.js"></script>
<link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

<!-- Header -->
<header id="header">
    <div class="header-left">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="3" fill="#4fc3f7"/>
                <circle cx="12" cy="4" r="2" fill="#4fc3f7" opacity="0.6"/>
                <circle cx="12" cy="20" r="2" fill="#4fc3f7" opacity="0.6"/>
                <circle cx="4" cy="12" r="2" fill="#4fc3f7" opacity="0.6"/>
                <circle cx="20" cy="12" r="2" fill="#4fc3f7" opacity="0.6"/>
                <line x1="12" y1="6" x2="12" y2="9" stroke="#4fc3f7" opacity="0.4"/>
                <line x1="12" y1="15" x2="12" y2="18" stroke="#4fc3f7" opacity="0.4"/>
                <line x1="6" y1="12" x2="9" y2="12" stroke="#4fc3f7" opacity="0.4"/>
                <line x1="15" y1="12" x2="18" y2="12" stroke="#4fc3f7" opacity="0.4"/>
            </svg>
            <span>Neural Net</span>
        </div>
    </div>
    <div class="header-center">
        <div class="search-wrapper">
            <input type="text" id="global-search" placeholder="Search knowledge base..." autocomplete="off">
            <div id="search-results" class="search-dropdown"></div>
        </div>
    </div>
    <div class="header-right">
        <div class="header-stats">
            <span id="header-chunks">0</span> chunks
            <span class="sep">|</span>
            <span id="header-domains">0</span> domains
        </div>
    </div>
</header>

<!-- Critical Alerts (ABOVE everything - first thing you see) -->
<div id="alerts-section"></div>

<!-- Tab Navigation -->
<nav id="tab-nav">
    <button class="nav-tab active" data-tab="command">Command</button>
    <button class="nav-tab" data-tab="graph">Neural Map</button>
    <button class="nav-tab" data-tab="projects">Projects</button>
    <button class="nav-tab" data-tab="finances">Money</button>
    <button class="nav-tab" data-tab="goals">Goals</button>
</nav>

<!-- Main Content (full width, single column) -->
<main id="main">

    <!-- Command Center Tab -->
    <div id="tab-command" class="tab-content active">
        <!-- Project Cards Grid (THE CORE - visible first) -->
        <div id="command-center-grid"></div>

        <!-- System Status (infrastructure, bottom of page, dimmer) -->
        <div class="system-footer">
            <div id="system-status" class="status-bar">
                <div class="status-item" id="status-search">
                    <span class="status-dot green"></span>
                    <span>Search</span>
                </div>
                <div class="status-item" id="status-reranker">
                    <span class="status-dot gray"></span>
                    <span>Reranker</span>
                </div>
                <div class="status-item" id="status-embeddings">
                    <span class="status-dot gray"></span>
                    <span>Embeddings</span>
                </div>
                <div class="status-item" id="status-reddit">
                    <span class="status-dot gray"></span>
                    <span>Reddit</span>
                </div>
                <div class="status-item" id="status-brainfeed">
                    <span class="status-dot gray"></span>
                    <span>Brain Feed</span>
                </div>
            </div>
            <div class="status-refresh">
                <span id="cmd-last-refresh" class="refresh-time"></span>
                <button id="cmd-refresh-btn" class="icon-btn" title="Refresh">&#x21bb;</button>
            </div>
        </div>
    </div>

    <!-- Neural Map Tab -->
    <div id="tab-graph" class="tab-content">
        <div id="graph-container">
            <svg id="graph-svg"></svg>
        </div>
        <div id="graph-hud">
            <input type="text" id="graph-search" placeholder="Filter nodes...">
            <div id="graph-domain-filters"></div>
        </div>
        <div id="graph-tooltip"></div>
        <div id="graph-legend"></div>
    </div>

    <!-- Projects Tab -->
    <div id="tab-projects" class="tab-content">
        <div class="tab-header">
            <h2>Projects</h2>
            <button id="add-project-btn" class="small-btn">+ Add</button>
        </div>
        <div id="projects-list"></div>
    </div>

    <!-- Finances Tab -->
    <div id="tab-finances" class="tab-content">
        <div class="tab-header">
            <h2>Finances</h2>
            <button id="add-finance-btn" class="small-btn">+ Add</button>
        </div>
        <div id="finance-summary"></div>
        <div id="finance-list"></div>
    </div>

    <!-- Goals Tab -->
    <div id="tab-goals" class="tab-content">
        <div class="tab-header">
            <h2>Goals</h2>
            <button id="add-goal-btn" class="small-btn">+ Add</button>
        </div>
        <div id="goals-list"></div>
    </div>
</main>

<!-- Node Detail Panel (slides up on mobile, from right on desktop) -->
<div id="node-detail">
    <div class="detail-header">
        <button id="node-detail-close" class="detail-close">&times;</button>
        <div id="node-detail-title" class="detail-title"></div>
        <div id="node-detail-badges" class="detail-badges"></div>
        <div id="node-detail-file" class="detail-file"></div>
    </div>
    <div id="node-detail-body" class="detail-body"></div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
