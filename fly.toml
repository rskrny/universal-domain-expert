app = "neural-net-dashboard"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "data"
  destination = "/app/retrieval/store"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
